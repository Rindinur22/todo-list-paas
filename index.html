<!DOCTYPE html>
<html>
<head>
  <title>To-Do List</title>
  <style>
    body {
      font-family: Arial;
      background: #f4f4f4;
      text-align: center;
    }

    .container {
      background: white;
      width: 350px;
      margin: 50px auto;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }

    h2 {
      color: #333;
    }

    input {
      padding: 10px;
      width: 70%;
      margin-right: 5px;
    }

    button {
      padding: 10px;
      background: #28a745;
      color: white;
      border: none;
      cursor: pointer;
      border-radius: 5px;
    }

    button:hover {
      background: #218838;
    }

    li {
      list-style: none;
      margin: 10px 0;
      padding: 10px;
      background: #eee;
      display: flex;
      justify-content: space-between;
      border-radius: 5px;
    }

    .delete {
      background: red;
      border: none;
      color: white;
      padding: 5px;
      cursor: pointer;
      border-radius: 5px;
    }
  </style>
</head>

<body>
  <div class="container">
    <h2>My To-Do List</h2>
    <p>Tugas Cloud Computing</p>

    <input type="text" id="task" placeholder="Masukkan tugas">
    <button onclick="addTask()">Tambah</button>

    <ul id="list"></ul>
  </div>

  <script>
    function addTask() {
      let task = document.getElementById("task").value;
      if(task === "") return;

      let li = document.createElement("li");
      li.innerHTML = task + 
        " <button class='delete' onclick='this.parentElement.remove()'>X</button>";

      document.getElementById("list").appendChild(li);
      document.getElementById("task").value = "";
    }
  </script>
</body>
</html>
